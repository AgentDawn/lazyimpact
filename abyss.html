<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LazyImpact | 나선비경</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <div style="display:flex;align-items:center;gap:2rem;">
      <a href="index.html" class="nav__brand">LazyImpact</a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link" data-i18n="nav.home">홈</a></li>
        <li><a href="smart-discard.html" class="nav__link">스마트 폐기</a></li>
        <li><a href="abyss.html" class="nav__link">나선비경</a></li>
      </ul>
    </div>
    <div class="nav__actions">
      <button class="nav__icon-btn"><span class="material-symbols-outlined">settings</span></button>
      <button class="nav__icon-btn"><span class="material-symbols-outlined">account_circle</span></button>
    </div>
  </div>
</nav>

<main class="main">
  <div class="artifacts-header" style="margin-bottom:2rem">
    <div>
      <h1>나선비경 최적화</h1>
      <p>보유 데이터 기반 최적 팀 편성 및 개선 추천</p>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:2rem">

    <!-- DFS Optimize Button -->
    <div style="display:flex;gap:1rem;margin-bottom:2rem">
      <button class="btn-primary" id="btn-dfs-optimize" style="flex:1">최적화 실행 (DFS 완전탐색)</button>
    </div>
    <div id="optimize-progress" style="display:none"></div>

    <!-- Season Info -->
    <section class="card card--low">
      <div class="section-title">시즌 정보</div>
      <div id="abyss-season-info">
        <div class="empty-state">
          <span class="material-symbols-outlined">hourglass_empty</span>
          <p>불러오는 중...</p>
        </div>
      </div>
    </section>

    <!-- First Half -->
    <section class="card card--container" id="abyss-first-half-section">
      <div class="section-title">전반 팀 추천</div>
      <div id="abyss-first-half">
        <div class="empty-state">
          <span class="material-symbols-outlined">hourglass_empty</span>
          <p>분석 중...</p>
        </div>
      </div>
    </section>

    <!-- Second Half -->
    <section class="card card--container" id="abyss-second-half-section">
      <div class="section-title">후반 팀 추천</div>
      <div id="abyss-second-half">
        <div class="empty-state">
          <span class="material-symbols-outlined">hourglass_empty</span>
          <p>분석 중...</p>
        </div>
      </div>
    </section>

    <!-- Overall Score -->
    <section class="card card--low">
      <div class="section-title">종합 점수</div>
      <div id="abyss-overall">
        <div class="empty-state">
          <span class="material-symbols-outlined">hourglass_empty</span>
          <p>계산 중...</p>
        </div>
      </div>
    </section>

    <!-- Recommendations -->
    <section class="card card--container">
      <div class="section-title">개선 추천</div>
      <div id="abyss-recommendations">
        <div class="empty-state">
          <span class="material-symbols-outlined">hourglass_empty</span>
          <p>분석 중...</p>
        </div>
      </div>
    </section>

    <section class="card card--low" style="margin-top:2rem">
      <div class="section-title">클리어 분석</div>
      <button class="btn-primary" id="btn-gap-analysis" style="margin-bottom:1rem">클리어 가능 여부 분석</button>
      <div id="gap-analysis-result"></div>
    </section>

  </div>
</main>

<footer class="footer">
  <div class="footer__inner">
    <p class="footer__copy" data-i18n="footer.disclaimer">이론 계산 목적으로 제공됩니다. HoYoverse와 관련이 없습니다.</p>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script src="js/abyss.js"></script>
</body>
</html>
