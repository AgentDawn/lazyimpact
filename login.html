<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LazyImpact | Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>

<main class="main" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding-top:0">
  <div class="card card--container" style="width:100%;max-width:24rem">
    <div style="text-align:center;margin-bottom:2rem">
      <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.03em">LazyImpact</h1>
      <p style="color:var(--on-surface-variant);font-size:0.875rem;margin-top:0.5rem" id="auth-subtitle">로그인하여 계속하세요</p>
    </div>

    <div id="auth-error" style="display:none;background:var(--error-container);color:var(--on-error-container);padding:0.75rem;border-radius:var(--r-md);font-size:0.75rem;margin-bottom:1rem;text-align:center"></div>

    <form id="auth-form" style="display:flex;flex-direction:column;gap:1rem">
      <div>
        <label data-i18n="auth.username" style="display:block;font-size:0.6875rem;font-weight:700;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">사용자 이름</label>
        <input type="text" id="auth-username" required autocomplete="username"
          style="width:100%;background:var(--surface-highest);border:none;border-radius:var(--r-md);padding:0.75rem 1rem;font-size:0.875rem;color:var(--on-surface);outline:none"
          placeholder="사용자 이름 입력"/>
      </div>
      <div>
        <label data-i18n="auth.password" style="display:block;font-size:0.6875rem;font-weight:700;color:var(--on-surface-variant);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">비밀번호</label>
        <input type="password" id="auth-password" required autocomplete="current-password"
          style="width:100%;background:var(--surface-highest);border:none;border-radius:var(--r-md);padding:0.75rem 1rem;font-size:0.875rem;color:var(--on-surface);outline:none"
          placeholder="비밀번호 입력"/>
      </div>
      <button type="submit" class="btn-primary" id="auth-submit" data-i18n="auth.signin" style="margin-top:0.5rem">로그인</button>
    </form>

    <div style="display:flex;align-items:center;gap:0.75rem;margin-top:1.25rem">
      <hr style="flex:1;border:none;border-top:1px solid var(--outline-variant)"/>
      <span style="font-size:0.6875rem;color:var(--on-surface-variant)">또는</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--outline-variant)"/>
    </div>

    <button id="btn-guest" style="width:100%;margin-top:1rem;padding:0.75rem;background:var(--surface-highest);border:1px solid var(--outline-variant);border-radius:var(--r-md);color:var(--on-surface);font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='var(--surface-bright)'" onmouseout="this.style.background='var(--surface-highest)'">
      비회원으로 시작
    </button>
    <p style="text-align:center;font-size:0.625rem;color:var(--outline);margin-top:0.5rem">회원가입 없이 바로 사용할 수 있습니다. 데이터는 이 브라우저에 저장됩니다.</p>

    <p style="text-align:center;margin-top:1.25rem;font-size:0.75rem;color:var(--on-surface-variant)">
      <span id="auth-toggle-text" data-i18n="auth.no.account">계정이 없으신가요?</span>
      <button id="auth-toggle" data-i18n="auth.register" style="color:var(--primary);font-size:0.75rem;margin-left:0.25rem;text-decoration:underline;background:none;border:none;cursor:pointer">회원가입</button>
    </p>

    <div id="security-notice" style="display:none;margin-top:1.5rem;padding:0.75rem;background:rgba(77,219,206,0.08);border-radius:var(--r-md);border-left:2px solid var(--secondary)">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.375rem">
        <span class="material-symbols-outlined" style="font-size:1rem;color:var(--secondary)">lock</span>
        <span style="font-size:0.75rem;font-weight:700;color:var(--secondary)">보안 안내</span>
      </div>
      <p style="font-size:0.6875rem;color:var(--on-surface-variant);line-height:1.5">비밀번호는 bcrypt 알고리즘으로 암호화하여 저장됩니다. 원본 비밀번호는 서버에 저장되지 않으며, 운영자도 확인할 수 없습니다.</p>
    </div>
  </div>
</main>

<script src="js/i18n.js"></script>
<script>
  const form = document.getElementById('auth-form')
  const errorEl = document.getElementById('auth-error')
  const toggleBtn = document.getElementById('auth-toggle')
  const toggleText = document.getElementById('auth-toggle-text')
  const subtitle = document.getElementById('auth-subtitle')
  const submitBtn = document.getElementById('auth-submit')
  let mode = 'login'

  toggleBtn.addEventListener('click', () => {
    mode = mode === 'login' ? 'register' : 'login'
    submitBtn.textContent = mode === 'login' ? t('auth.signin') : t('auth.create')
    submitBtn.dataset.i18n = mode === 'login' ? 'auth.signin' : 'auth.create'
    subtitle.textContent = mode === 'login' ? t('auth.signin') : t('auth.create')
    toggleText.textContent = mode === 'login' ? t('auth.no.account') : t('auth.has.account')
    toggleText.dataset.i18n = mode === 'login' ? 'auth.no.account' : 'auth.has.account'
    toggleBtn.textContent = mode === 'login' ? t('auth.register') : t('auth.signin')
    toggleBtn.dataset.i18n = mode === 'login' ? 'auth.register' : 'auth.signin'
    errorEl.style.display = 'none'
    const notice = document.getElementById('security-notice')
    if (notice) notice.style.display = mode === 'register' ? 'block' : 'none'
  })

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    errorEl.style.display = 'none'
    const username = document.getElementById('auth-username').value.trim()
    const password = document.getElementById('auth-password').value

    const endpoint = mode === 'login' ? '/api/login' : '/api/register'
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      })
      if (!res.ok) {
        const data = await res.json()
        throw new Error(data.error || 'Request failed')
      }
      if (mode === 'register') {
        // Auto-login after register
        const loginRes = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        })
        if (!loginRes.ok) throw new Error('Login after registration failed')
      }
      window.location.href = '/index.html'
    } catch (err) {
      const errKo = {
        'invalid credentials': '사용자 이름 또는 비밀번호가 올바르지 않습니다',
        'username and password required': '사용자 이름과 비밀번호를 입력해주세요',
        'password must be at least 8 characters': '비밀번호는 8자 이상이어야 합니다',
        'username already taken': '이미 사용 중인 사용자 이름입니다',
        'Request failed': '요청에 실패했습니다',
        'Login after registration failed': '회원가입 후 자동 로그인에 실패했습니다',
      }
      errorEl.textContent = errKo[err.message] || err.message
      errorEl.style.display = 'block'
    }
  })

  // Guest login
  document.getElementById('btn-guest').addEventListener('click', async () => {
    errorEl.style.display = 'none'
    try {
      const res = await fetch('/api/guest', { method: 'POST' })
      if (!res.ok) throw new Error('게스트 계정 생성에 실패했습니다')
      window.location.href = '/index.html'
    } catch (err) {
      errorEl.textContent = err.message
      errorEl.style.display = 'block'
    }
  })

  // If already logged in, redirect
  fetch('/api/me').then((r) => { if (r.ok) window.location.href = '/index.html' })

  initLangToggle(); applyTranslations();
  document.body.dataset.ready = 'true';
</script>
</body>
</html>
